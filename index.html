<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首頁 | HeTz 俱樂部</title>

<style>
:root { 
    --primary-color: #00d4ff; 
    --secondary-color: #7000ff; 
    --bg-dark: #07090d; 
    --card-bg: rgba(20, 24, 34, 0.75); 
    --text-light: #e0e0e0; 
}

body { 
    font-family: 'Microsoft JhengHei Bold', sans-serif; 
    background-image: linear-gradient(to bottom, rgba(7, 9, 13, 0.4), #07090d),
                      url('images/bg.png');
    background-size: cover;
    background-position: center;
    color: var(--text-light); 
    margin: 0; 
}

/* 導覽列 */
nav { 
    background: rgba(7, 9, 13, 0.85); 
    padding: 15px 20px; 
    display: flex; 
    align-items: center; 
}

.logo { 
    color: var(--primary-color); 
    font-weight: bold;
    text-decoration: none;
}

.nav-links {
    flex: 1;
    text-align: center;
}

.nav-links a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

.nav-links a:hover {
    color: var(--primary-color);
}

/* Hero */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 60px;
}

/* 按鈕 */
.btn {
    padding: 12px 30px;
    margin: 10px;
    text-decoration: none;
    border-radius: 5px;
}

.btn-main {
    background: var(--primary-color);
    color: black;
}

.btn-sub {
    border: 1px solid white;
    color: white;
}

/* 卡片 */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    padding: 40px;
}

.card {
    background: var(--card-bg);
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

.card img {
    width: 120px;
    border-radius: 50%;
}

</style>
</head>

<body>

<nav>
    <a href="/index.html" class="logo">HeTz 俱樂部</a>

    <div class="nav-links">
        <a href="/index.html">首頁</a>
        <a href="/team.html">打手陣容</a>
        <a href="/pricing.html">服務價目</a>
        <a href="/order.html">立即下單</a>
    </div>

    <a href="/login.html" class="btn btn-sub">登入</a>
</nav>

<div class="hero">
    <h1>HeTz 俱樂部</h1>

    <a href="https://discord.gg/5YssuKKB4b" target="_blank" class="btn btn-main">
        進入 Discord
    </a>

    <a href="/pricing.html" class="btn btn-sub">
        查看價目
    </a>
</div>

<section class="grid">

<div class="card">
    <img src="images/店長.jpg">
    <h3>打手：小潘</h3>
    <p>專精：三角洲</p>
</div>

<div class="card">
    <img src="images/player2.jpg">
    <h3>打手：阿豪</h3>
    <p>專精：快速代打</p>
</div>

</section>

</body>
</html>
