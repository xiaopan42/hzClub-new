<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打手陣容 | 赫茲電競俱樂部</title>
    <style>
        :root { --primary-color: #00d4ff; --secondary-color: #7000ff; --bg-dark: #0f1218; --card-bg: #1a1e26; --text-light: #e0e0e0; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: var(--bg-dark); color: var(--text-light); margin: 0; }
        
        /* ========================================= */
        /* ✨ 修改：導覽列佈局，讓選單置中、登入靠右 ✨ */
        /* ========================================= */
        nav { 
            background: #07090d; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; /* 讓左、中、右三個區塊平均分配空間 */
            align-items: center; 
            border-bottom: 1px solid #222;
        }
        .logo { 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: var(--primary-color); 
            text-decoration: none;
            flex: 1; /* 讓左邊佔用等比例空間 */
        }
        .nav-links { 
            display: flex;
            justify-content: center; /* 讓中間的按鈕精準置中 */
            flex: 2; /* 讓中間空間變大，確保置中效果 */
        }
        .nav-links a { 
            color: var(--text-light); 
            text-decoration: none; 
            margin: 0 15px; /* 左右對稱留白 */
        }
        .nav-links a:hover, .nav-links a.active { color: var(--primary-color); }
        
        /* ✨ 新增：右上角登入按鈕樣式 ✨ */
        .nav-auth {
            display: flex;
            justify-content: flex-end; /* 讓登入按鈕靠最右邊 */
            flex: 1; /* 讓右邊佔用等比例空間 */
        }
        .login-btn {
            color: var(--text-light);
            text-decoration: none;
            padding: 6px 15px;
            border: 1px solid var(--primary-color);
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            background: var(--primary-color);
            color: #000;
            font-weight: bold;
        }
        /* ========================================= */

        section { padding: 50px 20px; max-width: 1000px; margin: 0 auto; }
        h2 { text-align: center; border-bottom: 2px solid var(--primary-color); display: inline-block; padding-bottom: 10px; margin-bottom: 40px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; align-items: start; }
        
        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 25px; 
            border: 1px solid #333; 
            text-align: center; 
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .player-photo {
            width: 150px;          
            height: 150px;         
            border-radius: 50%;    
            object-fit: cover;     
            margin-bottom: 15px;   
            border: 3px solid #333; 
            transition: border-color 0.3s ease;
        }
        .card:hover .player-photo {
            border-color: var(--primary-color); 
        }

        .card h3 { color: var(--primary-color); margin-top: 0; margin-bottom: 10px; }
        
        .tags-container { margin-bottom: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;}
        .tag { background: var(--secondary-color); font-size: 0.8rem; padding: 3px 8px; border-radius: 4px; }
        
        .bio-text { text-align: left; font-size: 0.95rem; color: #ccc; }

        footer { text-align: center; padding: 30px; font-size: 0.8rem; color: #666; background: #07090d; margin-top: 50px;}
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">赫茲電競</a>
        
        <div class="nav-links">
            <a href="index.html">首頁</a>
            <a href="team.html" class="active">打手陣容</a>
            <a href="pricing.html">服務價目</a>
        </div>
        
        <div class="nav-auth">
            <a href="login.html" class="login-btn">登入帳號</a>
        </div>
    </nav>

    <section>
        <center><h2>👥 俱樂部全體打手陣容</h2></center>
        <div class="grid">
            
            <div class="card">
                <img src="images/下.jpg" alt="打手小潘" class="player-photo">
                <h3>打手：小潘 (Xiaopan)</h3>
                <div class="tags-container">
                    <span class="tag">擅長角色：威龍.疾風.露娜</span>
                    <span class="tag">擅長地圖：航天.巴克什</span>
                </div>
                <div class="bio-text">
                    <p><strong>遊玩風格：</strong> 極致歐美打法 </p>
                    <p><strong>自我介紹：</strong> 俱樂部店長，兩字歐美一字狂，見人我就往地躺。</p>
                </div>
            </div>

            <div class="card">
                <img src="images/EF2908E0-0733-4C14-A049-035418B86914.jpg" alt="打手小陳" class="player-photo">
                <h3>打手：小陳 (XiaocheN)</h3>
                <div class="tags-container">
                    <span class="tag">擅長角色：疾風.露娜</span>
                    <span class="tag">擅長地圖：航天</span>
                </div>
                <div class="bio-text">
                    <p><strong>遊玩風格：</strong> 極致中東打法</p>
                    <p><strong>自我介紹：</strong> 疾風是我媽媽。</p>
                </div>
            </div>
            
        </div>
    </section>

    <footer>&copy; 2026 赫茲電競俱樂部. All Rights Reserved.</footer>

</body>
</html>
