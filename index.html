<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首頁 | HeTz 俱樂部</title>
    <style>
        :root { 
            --primary-color: #00d4ff; 
            --secondary-color: #7000ff; 
            --bg-dark: #0a0c10; 
            --card-bg: #141822; 
            --text-light: #e0e0e0; 
        }
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: var(--bg-dark); color: var(--text-light); margin: 0; overflow-x: hidden; }
        
        /* 導覽列佈局 */
        nav { 
            background: rgba(7, 9, 13, 0.8); 
            backdrop-filter: blur(10px); 
            padding: 15px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #1a1f2c;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: var(--primary-color); 
            text-decoration: none;
            flex: 1; 
        }
        .nav-links { 
            display: flex;
            justify-content: center; 
            flex: 2; 
        }
        .nav-links a { 
            color: var(--text-light); 
            text-decoration: none; 
            margin: 0 15px; 
            font-size: 0.95rem;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--primary-color); }
        
        .nav-auth {
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            flex: 1; 
            gap: 10px;
        }
        .login-btn {
            color: var(--text-light);
            text-decoration: none;
            padding: 6px 18px;
            border: 1px solid var(--primary-color);
            border-radius: 4px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        .login-btn:hover {
            background: var(--primary-color);
            color: #000;
            font-weight: bold;
        }
        .user-profile {
            display: none; 
            align-items: center;
            gap: 8px;
        }
        .nav-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
        }
        .nav-username {
            font-size: 0.95rem;
        }

        /* 主視覺英雄區 */
        .hero-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            min-height: 60vh; /* 稍微縮小高度讓版面更緊湊 */
        }

        /* 左側文字與按鈕區 */
        .hero-content {
            flex: 1.2; /* 讓左邊空間大一點確保不分行 */
            max-width: 600px;
        }
        
        /* ✨ 修改：字體寬度放寬，確保一整行不分行 ✨ */
        .hero-title {
            font-size: 4rem;
            font-weight: 900;
            margin: 0 0 35px 0; /* 調整下方留白 */
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            letter-spacing: 2px;
            white-space: nowrap; /* 強制不分行 */
        }
        
        .hero-buttons {
            display: flex;
            gap: 15px;
        }
        .btn-main {
            background: var(--primary-color);
            color: #000;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 6px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }
        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.6);
        }
        .btn-sub {
            background: rgba(255,255,255,0.05);
            color: #fff;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 6px;
            border: 1px solid #333;
            font-weight: bold;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-sub:hover {
            background: rgba(255,255,255,0.1);
            border-color: #555;
        }

        /* 右側影片播放展示區 */
        .hero-display {
            flex: 1;
            background: #11141c;
            border: 1px solid #222a3a;
            border-radius: 12px;
            aspect-ratio: 16 / 9;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
        }
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .play-button:hover {
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%) scale(1.1);
        }
        .play-button::after {
            content: '';
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 10px 0 10px 18px;
            border-color: transparent transparent transparent #fff;
            margin-left: 5px;
        }
        .display-tag {
            color: var(--primary-color);
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .display-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            margin: 0;
        }

        /* 下半部內容區 */
        .content-section { padding: 60px 20px; max-width: 1000px; margin: 0 auto; border-top: 1px solid #1a1f2c; }
        h2 { text-align: center; border-bottom: 2px solid var(--primary-color); display: inline-block; padding-bottom: 10px; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; align-items: start; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 25px; border: 1px solid #222a3a; text-align: center; transition: transform 0.3s ease, border-color 0.3s ease; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary-color); }
        .player-photo { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid #222a3a; transition: border-color 0.3s ease; }
        .card:hover .player-photo { border-color: var(--primary-color); }
        .card h3 { color: var(--primary-color); margin-top: 0; margin-bottom: 10px; }
        .tags-container { margin-bottom: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;}
        .tag { background: var(--secondary-color); font-size: 0.8rem; padding: 3px 8px; border-radius: 4px; }
        .bio-text { text-align: left; font-size: 0.95rem; color: #ccc; }

        footer { text-align: center; padding: 30px; font-size: 0.8rem; color: #666; background: #07090d; margin-top: 50px;}
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">HeTz 俱樂部</a>
        <div class="nav-links">
            <a href="index.html" class="active">首頁</a>
            <a href="team.html">打手陣容</a>
            <a href="pricing.html">服務價目</a>
        </div>
        <div class="nav-auth">
            <a href="login.html" id="nav-login-btn" class="login-btn">登入帳號</a>
            <div id="nav-user-profile" class="user-profile">
                <img id="nav-user-avatar" class="nav-avatar" src="" alt="頭像">
                <span id="nav-user-name" class="nav-username">玩家</span>
            </div>
        </div>
    </nav>

    <div class="hero-container">
        <div class="hero-content">
            <h1 class="hero-title">HeTz 俱樂部</h1>
            
            <div class="hero-buttons">
                <a href="https://discord.gg/5YssuKKB4b" target="_blank" class="btn-main">進入Discord群組</a>
                <a href="pricing.html" class="btn-sub">前往價目表</a>
            </div>
        </div>

            <div class="hero-display" style="padding: 0; overflow: hidden; background: #11141c; min-height: 250px;">
            <video width="100%" height="100%" autoplay loop muted playsinline controls style="object-fit: cover; display: block; min-height: 250px;">
                <source src="videos/highlight.mp4" type="video/mp4">
                您的瀏覽器不支援影片播放。
            </video>
        </div>
    </div>

    <section class="content-section">
        <center><h2>👥 俱樂部金牌打手</h2></center>
        <div class="grid">
            <div class="card">
                <img src="images/下.jpg" alt="打手小潘" class="player-photo">
                <h3>打手：小潘 (Xiaopan)</h3>
                <div class="tags-container">
                    <span class="tag">擅長角色：威龍.疾風.露娜</span>
                    <span class="tag">擅長地圖：航天.巴克什</span>
                </div>
                <div class="bio-text">
                    <p><strong>遊玩風格：</strong> 極致歐美打法 </p>
                    <p><strong>自我介紹：</strong> 俱樂部店長，兩字歐美一字狂，見人我就往地躺。</p>
                </div>
            </div>

            <div class="card">
                <img src="images/EF2908E0-0733-4C14-A049-035418B86914.jpg" alt="打手小陳" class="player-photo">
                <h3>打手：小陳 (XiaocheN)</h3>
                <div class="tags-container">
                    <span class="tag">擅長角色：疾風.露娜</span>
                    <span class="tag">擅長地圖：航天</span>
                </div>
                <div class="bio-text">
                    <p><strong>遊玩風格：</strong> 極致中東打法</p>
                    <p><strong>自我介紹：</strong> 疾風是我媽媽。</p>
                </div>
            </div>
        </div>
    </section>

    <footer>&copy; 2026 HeTz 俱樂部. All Rights Reserved.</footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const savedUser = localStorage.getItem('discord_user');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                document.getElementById('nav-login-btn').style.display = 'none';
                document.getElementById('nav-user-profile').style.display = 'flex';
                document.getElementById('nav-user-name').innerText = user.username;
                if (user.avatar) {
                    document.getElementById('nav-user-avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
                } else {
                    document.getElementById('nav-user-avatar').src = "https://cdn.discordapp.com/embed/avatars/0.png";
                }
            }
        });
    </script>
</body>
</html>
