<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首頁 | HeTz 俱樂部</title>
    <style>
        :root { 
            --primary-color: #00d4ff; 
            --secondary-color: #7000ff; 
            --bg-dark: #07090d; 
            --card-bg: rgba(20, 24, 34, 0.75); 
            --text-light: #e0e0e0; 
        }
        
        /* ========================================= */
        /* 🌌 全站大背景：使用你提供的高質感電競大圖 */
        /* ========================================= */
        body { 
            font-family: 'Microsoft JhengHei Bold', sans-serif; 
            background-image: linear-gradient(to bottom, rgba(7, 9, 13, 0.4) 0%, rgba(7, 9, 13, 0.60) 60%, #07090d 100%), 
                              url('images/fa658c1a-e381-46ba-a934-4355a43f190c.png'); /* 💡 確保圖片檔名與路徑正確 */
            background-size: cover;
            background-position: center top;
            background-attachment: fixed; /* 滾動時背景固定，產生高級立體感 */
            color: var(--text-light); 
            margin: 0; 
            overflow-x: hidden; 
        }
        
        /* 🧭 導覽列佈局 */
        nav { 
            background: rgba(7, 9, 13, 0.85); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            border-bottom: 1px solid rgba(26, 31, 44, 0.6);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: var(--primary-color); 
            text-decoration: none;
            width: 200px;
            box-sizing: border-box;
            letter-spacing: 1px;
        }
        .nav-links { 
            flex: 1; 
            text-align: center; 
        }
        .nav-links a { 
            color: var(--text-light); 
            text-decoration: none; 
            margin: 0 15px; 
            font-size: 1.05rem;
            transition: color 0.3s ease;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--primary-color); }
        
        .nav-auth {
            width: 200px;
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            box-sizing: border-box;
            gap: 10px;
        }
        .login-btn {
            display: inline-block;
            color: var(--primary-color);
            text-decoration: none;
            padding: 6px 16px;
            border: 1px solid var(--primary-color);
            border-radius: 4px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            font-weight: bold;
            background: rgba(0, 212, 255, 0.05);
        }
        .login-btn:hover {
            background: var(--primary-color);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }
        .user-profile {
            display: none; 
            align-items: center;
            gap: 8px;
        }
        .nav-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
        }
        .nav-username { font-size: 0.95rem; }

        /* ========================================= */
        /* 🎭 主視覺區（標題與大顆按鈕） */
        /* ========================================= */
        .hero-section-wrapper {
            width: 100%;
            padding-top: 60px;
        }
        .hero-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            text-align: center;
        }
        .hero-content {
            max-width: 800px;
            margin: 0 auto 40px auto;
        }
        .hero-title {
            font-size: 4.5rem;
            font-weight: 900;
            margin: 0 0 25px 0;
            color: #fff;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.6), 0 0 10px rgba(112, 0, 25ff, 0.5);
            letter-spacing: 4px;
        }
        .hero-buttons { 
            display: flex; 
            gap: 20px; 
            justify-content: center;
        }
        .btn-main {
            background: var(--primary-color);
            color: #000;
            text-decoration: none;
            padding: 14px 36px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
        }
        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(0, 212, 255, 0.7);
        }
        .btn-sub {
            background: rgba(255,255,255,0.05);
            color: #fff;
            text-decoration: none;
            padding: 14px 36px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: bold;
            font-size: 1.1rem;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        .btn-sub:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.15);
            border-color: #fff;
        }

        .video-cinema-section {
            max-width: 1000px; /* 微調最大寬度，讓 16:9 在大螢幕下高度更適中 */
            margin: 40px auto 0 auto;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .hero-display {
            width: 100%;
            background: #0b0e14;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 16px;
            aspect-ratio: 16 / 9; /* 💡 完美回復 16:9 正常遊戲影片比例 */
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 30px rgba(0, 212, 255, 0.1);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .hero-display:hover {
            border-color: var(--primary-color);
            box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 40px rgba(0, 212, 255, 0.25);
        }
        .hero-display video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 💡 改用 contain 確保影片不管怎樣都不會被切到頭尾 */
            display: block;
        }

        /* 下半部打手內容區 */
        .content-section { padding: 100px 20px 80px 20px; max-width: 1000px; margin: 0 auto; }
        h2 { text-align: center; border-bottom: 2px solid var(--primary-color); display: inline-block; padding-bottom: 10px; margin-bottom: 50px; font-size: 2rem; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0,212,255,0.3); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; align-items: start; }
        
        /* 卡片毛玻璃發光升級 */
        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 16px; 
            padding: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            text-align: center; 
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease; 
        }
        .card:hover { 
            transform: translateY(-8px); 
            border-color: var(--primary-color); 
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.2);
        }
        
        .player-photo { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 3px solid rgba(255,255,255,0.1); transition: border-color 0.3s ease, transform 0.3s ease; }
        .card:hover .player-photo { border-color: var(--primary-color); transform: scale(1.05); }
        .card h3 { color: var(--primary-color); margin-top: 0; margin-bottom: 15px; font-size: 1.35rem; }
        .tags-container { margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;}
        .tag { background: var(--secondary-color); font-size: 0.8rem; padding: 4px 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); font-weight: bold; }
        .bio-text { text-align: left; font-size: 0.95rem; color: #d0d0d0; line-height: 1.6; }
        .bio-text p { margin: 8px 0; }

        footer { text-align: center; padding: 40px 20px; font-size: 0.85rem; color: #555; background: #040507; margin-top: 80px; border-top: 1px solid rgba(255,255,255,0.02); letter-spacing: 1px;}
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">HeTz 俱樂部</a>
        <div class="nav-links">
            <a href="index.html" class="active">首頁</a>
            <a href="team">打手陣容</a>
            <a href="pricing">服務價目</a>
        </div>
        <div class="nav-auth">
            <a href="login" id="nav-login-btn" class="login-btn">登入帳號</a>
            <div id="nav-user-profile" class="user-profile">
                <img id="nav-user-avatar" class="nav-avatar" src="" alt="頭像">
                <span id="nav-user-name" class="nav-username">玩家</span>
            </div>
        </div>
    </nav>

    <div class="hero-section-wrapper">
        <div class="hero-container">
            <div class="hero-content">
                <h1 class="hero-title">HeTz 俱樂部</h1>
                <div class="hero-buttons">
                    <a href="https://discord.gg/5YssuKKB4b" target="_blank" class="btn-main">進入 Discord 群組</a>
                    <a href="pricing" class="btn-sub">前往價目表</a>
                </div>
            </div>
        </div>
    </div>

    <div class="video-cinema-section">
        <div class="hero-display">
            <video autoplay loop muted playsinline controls>
                <source src="videos/Videos.mp4" type="video/mp4">
                您的瀏覽器不支援影片播放。
            </video>
        </div>
    </div>

    <section class="content-section">
        <center><h2>👥 俱樂部金牌打手</h2></center>
        <div class="grid">
            
            <div class="card">
                <img src="images/下.jpg" alt="打手小潘" class="player-photo">
                <h3>打手：小潘 (Xiaopan)</h3>
                <div class="tags-container">
                    <span class="tag">擅長角色：威龍.疾風.露娜</span>
                    <span class="tag">擅長地圖：航天.巴克什</span>
                </div>
                <div class="bio-text">
                    <p><strong>遊玩風格：</strong> 極致歐美打法 </p>
                    <p><strong>自我介紹：</strong> 俱樂部店長，兩字歐美一字狂，見人我就往地躺。</p>
                </div>
            </div>

            <div class="card">
                <img src="images/EF2908E0-0733-4C14-A049-035418B86914.jpg" alt="打手小陳" class="player-photo">
                <h3>打手：小陳 (XiaocheN)</h3>
                <div class="tags-container">
                    <span class="tag">擅長角色：疾風.露娜</span>
                    <span class="tag">擅長地圖：航天</span>
                </div>
                <div class="bio-text">
                    <p><strong>遊玩風格：</strong> 極致中東打法</p>
                    <p><strong>自我介紹：</strong> 疾風是我媽媽。</p>
                </div>
            </div>
            
        </div>
    </section>

    <footer>&copy; 2026 HeTz 俱樂部. All Rights Reserved.</footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const savedUser = localStorage.getItem('discord_user');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                document.getElementById('nav-login-btn').style.display = 'none';
                document.getElementById('nav-user-profile').style.display = 'flex';
                document.getElementById('nav-user-name').innerText = user.username;
                if (user.avatar) {
                    document.getElementById('nav-user-avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
                } else {
                    document.getElementById('nav-user-avatar').src = "https://cdn.discordapp.com/embed/avatars/0.png";
                }
            }
        });
    </script>
</body>
</html>
