<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>HeTz 接單系統</title>

<style>
body {
    background: #0a0f1f;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: #111;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
}
input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    background: #222;
    border: none;
    color: white;
}
button {
    width: 100%;
    padding: 12px;
    background: #00eaff;
    border: none;
    font-weight: bold;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container">
<h2>三角洲下單</h2>

<input id="name" placeholder="你的名字">
<div id="discord-info" style="margin:10px 0; color:#ccc;">
    Discord 帳號：<span id="discord-user">未登入</span>
</div>
<select id="service">
<option>1028萬 - 600TWD</option>
<option>2300萬 - 1300TWD</option>
<option>3600萬 - 2500TWD</option>
<option>5500萬 - 3500TWD</option>
<option>1億 - 6500TWD</option>
</select>

<button id="order-btn" onclick="sendOrder()">送出訂單</button>
<p id="order-message" style="color:#ff8c00; margin-top: 12px;"></p>

</div>

<script>
function getDiscordUser() {
    const savedUser = localStorage.getItem('discord_user');
    return savedUser ? JSON.parse(savedUser) : null;
}

document.addEventListener('DOMContentLoaded', function() {
    const user = getDiscordUser();
    const orderBtn = document.getElementById('order-btn');
    const discordUserEl = document.getElementById('discord-user');
    const orderMessage = document.getElementById('order-message');

    if (!user) {
        orderBtn.disabled = true;
        orderBtn.style.opacity = '0.6';
        discordUserEl.innerText = '未登入';
        orderMessage.innerText = '請先登入 Discord 才能下單。';
        return;
    }

    const discordTag = user.discriminator ? `${user.username}#${user.discriminator}` : user.username;
    discordUserEl.innerText = discordTag;
});

async function sendOrder() {
    const user = getDiscordUser();
    if (!user) {
        alert('請先登入 Discord 才能下單');
        window.location.href = 'login.html';
        return;
    }

    const name = document.getElementById('name').value.trim();
    if (!name) {
        alert('請填寫你的名字');
        return;
    }

    const discordTag = user.discriminator ? `${user.username}#${user.discriminator}` : user.username;
    const data = {
        name,
        discord: discordTag,
        discord_id: user.id,
        service: document.getElementById('service').value
    };

    const res = await fetch('/api/order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });

    if (res.ok) {
        alert('下單成功！');
    } else {
        alert('下單失敗，請稍後再試');
    }
}
</script>

</body>
</html>
