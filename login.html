<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入 | HeTz俱樂部</title>
    <style>
        :root { --primary-color: #00d4ff; --discord-color: #5865F2; --bg-dark: #0f1218; --card-bg: #1a1e26; --text-light: #e0e0e0; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: var(--bg-dark); color: var(--text-light); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-container { background: var(--card-bg); border: 1px solid #333; padding: 40px; border-radius: 12px; text-align: center; max-width: 400px; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: var(--primary-color); margin-bottom: 30px; }
        
        /* Discord 按鈕樣式 */
        .discord-btn { display: inline-flex; align-items: center; justify-content: center; background-color: var(--discord-color); color: white; text-decoration: none; padding: 12px 25px; border-radius: 6px; font-size: 1.1rem; font-weight: bold; transition: background 0.3s; width: 80%; }
        .discord-btn:hover { background-color: #4752C4; }
        
        /* 登入成功後的用戶資訊樣式 */
        .user-info { display: none; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary-color); margin-bottom: 15px; }
        .username { font-size: 1.3rem; font-weight: bold; margin-bottom: 20px; }
        .back-btn { display: inline-block; color: #000; background: var(--primary-color); padding: 8px 20px; text-decoration: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-container">
        <div id="login-box">
            <h2>赫茲電競俱樂部</h2>
            <a href="https://discord.com/oauth2/authorize?client_id=1429779811760603188&response_type=code&redirect_uri=ttps%3A%2F%2Fhetz.esports.com%2Flogin.html&scope=identify" class="discord-btn">
                使用 Discord 登入
            </a>
        </div>

        <div id="user-box" class="user-info">
            <h2>歡迎回來！</h2>
            <img id="user-avatar" class="avatar" src="" alt="頭像">
            <div id="user-name" class="username">載入中...</div>
            <a href="index.html" class="back-btn">回首頁</a>
        </div>
    </div>

    <script>
        // 檢查網址列有沒有 Discord 傳回來的 access_token
        const fragment = new URLSearchParams(window.location.hash.slice(1));
        const accessToken = fragment.get('access_token');

        if (accessToken) {
            // 如果有 token，隱藏登入按鈕，顯示用戶資訊
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('user-box').style.display = 'block';

            // 拿著 token 去跟 Discord 討使用者的資料
            fetch('https://discord.com/api/users/@me', {
                headers: {
                    Authorization: `Bearer ${accessToken}`,
                },
            })
            .then(res => res.json())
            .then(response => {
                const { username, discriminator, id, avatar } = response;
                
                // 顯示名字
                document.getElementById('user-name').innerText = `${username}`;
                
                // 顯示頭像 (如果他有設定頭像的話)
                if (avatar) {
                    document.getElementById('user-avatar').src = `https://cdn.discordapp.com/avatars/${id}/${avatar}.png`;
                } else {
                    document.getElementById('user-avatar').src = "https://cdn.discordapp.com/embed/avatars/0.png";
                }

                // 【進階】你可以把登入狀態存進瀏覽器，這樣換頁才不會消失
                localStorage.setItem('discord_user', JSON.stringify({ username, id, avatar }));
            })
            .catch(console.error);
        }
    </script>
</body>
</html>
