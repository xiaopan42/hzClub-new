<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeTz 電競俱樂部登入</title>

<style>
:root {
    --primary-color: #00eaff;
    --card-bg: #111;
    --discord-color: #5865F2;
}

body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #0a0f1f, #05070d);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    color: white;
}

/* 容器 */
.login-container {
    background: var(--card-bg);
    border: 1px solid #222;
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 0 30px rgba(0,234,255,0.15);
}

/* 標題 */
h2 {
    color: var(--primary-color);
    margin-bottom: 30px;
    letter-spacing: 2px;
}

/* Discord 按鈕 */
.discord-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #5865F2, #404EED);
    color: white;
    text-decoration: none;
    padding: 14px 25px;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    transition: all 0.25s ease;
    width: 80%;
    box-shadow: 0 0 15px rgba(88,101,242,0.4);
}

.discord-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 25px rgba(88,101,242,0.7);
}

/* 使用者區塊 */
.user-info {
    display: none;
}

.avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid var(--primary-color);
    margin-bottom: 15px;
}

.username {
    font-size: 1.3rem;
    font-weight: bold;
    margin-bottom: 20px;
}

/* 按鈕 */
.btn {
    display: inline-block;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    margin: 5px;
    cursor: pointer;
}

.home-btn {
    background: var(--primary-color);
    color: black;
}

.logout-btn {
    background: #ff4d4d;
    color: white;
}
</style>

</head>

<body>

<div class="login-container">

<!-- 登入區 -->
<div id="login-box">
    <h2>HeTz 電競俱樂部</h2>
    <a class="discord-btn"
       href="https://discord.com/oauth2/authorize?client_id=1429779811760603188&response_type=token&redirect_uri=https%3A%2F%2Fhetz-esports.vercel.app%2Flogin&scope=identify">
        使用 Discord 登入
    </a>
</div>

<!-- 使用者資訊 -->
<div id="user-box" class="user-info">
    <h2>歡迎回來！</h2>
    <img id="user-avatar" class="avatar" src="" alt="頭像">
    <div id="user-name" class="username">載入中...</div>

    <a href="index.html" class="btn home-btn">回首頁</a>
    <button id="logout-btn" class="btn logout-btn">登出</button>
</div>

</div>

<script>
// ====== 1️⃣ 先檢查 localStorage（自動登入） ======
const savedUser = localStorage.getItem('discord_user');

if (savedUser) {
    const user = JSON.parse(savedUser);
    showUser(user);
}

// ====== 2️⃣ 檢查 Discord 回傳 token ======
const fragment = new URLSearchParams(window.location.hash.slice(1));
const accessToken = fragment.get('access_token');

if (accessToken) {
    fetch('https://discord.com/api/users/@me', {
        headers: {
            Authorization: `Bearer ${accessToken}`,
        },
    })
    .then(res => {
        if (!res.ok) throw new Error('無法取得 Discord 用戶資料');
        return res.json();
    })
    .then(user => {
        const { username, id, avatar, discriminator } = user;

        const userData = { username, id, avatar, discriminator };

        // 顯示
        showUser(userData);

        // 儲存
        localStorage.setItem('discord_user', JSON.stringify(userData));

        // 清除網址 token（安全）
        window.history.replaceState({}, document.title, window.location.pathname);
    })
    .catch(() => {
        alert("登入失敗，請重試");
    });
}

// ====== 顯示使用者 ======
function showUser(user) {
    document.getElementById('login-box').style.display = 'none';
    document.getElementById('user-box').style.display = 'block';

    const displayName = user.discriminator ? `${user.username}#${user.discriminator}` : user.username;
    document.getElementById('user-name').innerText = displayName;

    if (user.avatar) {
        document.getElementById('user-avatar').src =
            `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
    } else {
        document.getElementById('user-avatar').src =
            "https://cdn.discordapp.com/embed/avatars/0.png";
    }
}

// ====== 登出 ======
document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.removeItem('discord_user');
    location.reload();
});
</script>

</body>
</html>
